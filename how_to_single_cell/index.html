<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Artifact or Signal? — Single-Cell Interactive Quiz</title>
  <link rel="stylesheet" href="style.css">
  <!-- QR Code library (CDN, small) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <header>
    <h1>Artifact or Signal?</h1>
    <p>When does QC noise become biological insight?</p>
  </header>

  <div class="app-layout">
    <nav class="nav-sidebar"></nav>

    <main class="container">
      <!-- Landing page -->
      <div class="page active" id="page-landing"></div>

      <!-- Topic pages rendered by JS -->
      <div id="topics-container"></div>

      <!-- Results page -->
      <div class="page" id="page-results"></div>

      <!-- Teacher view -->
      <div class="page" id="page-teacher"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
